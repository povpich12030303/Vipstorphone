<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Detail</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f5f5f5;
        padding: 40px;
      }

      .container {
        display: flex;
        gap: 40px;
        align-items: flex-start;
      }

      /* LEFT SIDE */

      .gallery {
        width: 50%;
      }

      .main-image {
        width: 100%;
        height: 600px;
        border: 1px solid #ddd;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .main-image img {
        width: 300px;
      }

      .small-images {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      .small-images img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border: 1px solid #ccc;
        padding: 10px;
        cursor: pointer;
        background: white;
        border-radius: 10px;
        transition: 0.3s;
      }

      .small-images img:hover {
        border: 2px solid #003399;
      }

      /* RIGHT SIDE */

      .details {
        width: 50%;
      }

      .details h1 {
        font-size: 45px;
        margin-bottom: 20px;
        color: #1e2b4f;
      }

      .tags {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 25px;
      }

      .tags span {
        background: #003399;
        color: white;
        padding: 10px 15px;
        border-radius: 20px;
        font-size: 14px;
      }

      .price {
        color: #000000;
        font-size: 45px;
        margin-bottom: 40px;
      }

      .details h2 {
        margin-bottom: 20px;
        color: #1e2b4f;
      }

      /* COLORS */

      .colors {
        display: flex;
        gap: 20px;
        margin-bottom: 50px;
      }

      .color-box {
        width: 150px;
        border: 1px solid #ccc;
        padding: 20px;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
        background: white;
      }

      .circle {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        margin: auto;
        margin-bottom: 15px;
      }

      .black {
        background: black;
      }

      .blue {
        background: #0066cc;
      }

      .pink {
        background: pink;
      }

      .white {
        background: white;
        border: 1px solid #ccc;
      }

      /* BUTTON AREA */

      .cart-area {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 30px;
      }

      .qty {
        display: flex;
        border: 1px solid #003399;
        border-radius: 5px;
        overflow: hidden;
      }

      .qty button {
        width: 60px;
        height: 55px;
        border: none;
        background: white;
        font-size: 25px;
        cursor: pointer;
        color: #003399;
      }

      .qty input {
        width: 80px;
        text-align: center;
        border: none;
        font-size: 22px;
        color: #003399;
        font-weight: bold;
      }

      .add-cart {
        background: #003399;
        color: white;
        border: none;
        padding: 18px 40px;
        font-size: 22px;
        border-radius: 5px;
        cursor: pointer;
      }

      .favorite {
        color: #003399;
        font-size: 22px;
        cursor: pointer;
      }

      .share {
        margin-top: 40px;
        font-size: 22px;
        color: #1e2b4f;
      }

      .share i {
        color: #003399;
        margin-left: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- LEFT -->

      <div class="gallery">
        <div class="main-image">
          <img
            id="bigImage"
            src="https://mac-center.com.pe/cdn/shop/files/IMG-18068283_m_jpeg_1_ce1a78fd-3192-49c3-9951-7a191fea9072.jpg?v=1757450089&width=823"
          />
        </div>

        <div class="small-images">
          <img
            src="https://www.mobileana.com/wp-content/uploads/2025/06/Apple-iPhone-17-Pro-Max-Cosmic-Orange.webp"
            onclick="changeImage(this.src)"
          />
          <img
            src="https://assets.kogan.com/files/product/2025/Apple/iPhone_17_2025/PDP_Launch_iPhone-17-Pro-Max_Deep_Blue_Feed.jpg?auto=webp&bg-color=fff&canvas=1200%2C800&dpr=1&enable=upscale&fit=bounds&height=800&quality=90&width=1200"
            onclick="changeImage(this.src)"
          />
          <img
            src="https://mac-center.com.pe/cdn/shop/files/IMG-18068283_m_jpeg_1_ce1a78fd-3192-49c3-9951-7a191fea9072.jpg?v=1757450089&width=823"
            onclick="changeImage(this.src)"
          />
        </div>
      </div>

      <!-- RIGHT -->

      <div class="details">
        <h1>IPHONE 17 PRO MAX</h1>

        <div class="tags">
          <span>Sony</span>
          <span>Bluetooth Earphones</span>
          <span>Bluetooth Speaker</span>
          <span>Headphone</span>
          <span>Accessories</span>
        </div>

        <div class="price">$1499$</div>

        <h2>Choose your color</h2>

        <div class="colors">
          <div class="color-box">
            <div class="circle black"></div>
            <p>Black</p>
          </div>

          <div class="color-box">
            <div class="circle blue"></div>
            <p>Blue</p>
          </div>

          <div class="color-box">
            <div class="circle pink"></div>
            <p>Pink</p>
          </div>
        </div>

        <h2>One Year Warranty</h2>

        <div class="cart-area">
          <div class="qty">
            <button onclick="minus()">-</button>

            <input type="text" id="qty" value="1" />

            <button onclick="plus()">+</button>
          </div>
          <a href="cheakout.html">
            <button class="add-cart">
              <i class="fa-solid fa-cart-shopping"></i>
              Check Out
            </button>
          </a>

          <div class="favorite">
            <i class="fa-regular fa-heart"></i>
            Add to Favorite
          </div>
        </div>

        <div class="share">
          Share this product:
          <i class="fa-brands fa-facebook"></i>
        </div>
      </div>
    </div>

    <script>
      // CHANGE IMAGE

      function changeImage(src) {
        document.getElementById("bigImage").src = src;
      }

      // QUANTITY

      function plus() {
        let qty = document.getElementById("qty");
        qty.value = parseInt(qty.value) + 1;
      }

      function minus() {
        let qty = document.getElementById("qty");

        if (qty.value > 1) {
          qty.value = parseInt(qty.value) - 1;
        }
      }
    </script>
  </body>
</html>
