<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link

    />

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
        <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="

      referrerpolicy="no-referrer"

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"

    <link rel="stylesheet" href="./style.css" />


    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      /* HEADER */
      header {
        width: 100%;
        background: #f7f7f7;
        border-bottom: 1px solid #ddd;
      }

      .top-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 20px 40px;
      }

      .logo {
        text-align: center;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .logo span {
        display: block;
        font-size: 12px;
        letter-spacing: 6px;
        margin-top: -5px;
      }

      .icons {
        position: absolute;
        right: 40px;
        display: flex;
        gap: 25px;
        font-size: 28px;
      }

      nav {
        display: flex;
        justify-content: center;
        gap: 60px;
        padding: 22px 20px;
        border-top: 1px solid #e1e1e1;
        font-size: 18px;
        letter-spacing: 3px;
      }

      nav a {
        transition: 0.3s;
      }

      nav a:hover {
        color: #888;
      }

      /* MAIN */
      .container {
        display: flex;
        padding: 40px 50px;
        gap: 50px;
      }

      /* SIDEBAR */
      .sidebar {
        width: 250px;
      }

      .filter-title {
        font-size: 26px;
        letter-spacing: 4px;
        margin-bottom: 25px;
        margin-top: 30px;
      }

      .sidebar ul {
        list-style: none;
      }

      .sidebar li {
        margin: 22px 0;
        color: #666;
        font-size: 20px;
        cursor: pointer;
        transition: 0.3s;
      }

      .sidebar li:hover {
        color: #000;
        transform: translateX(5px);
      }

      /* CONTENT */
      .content {
        flex: 1;
      }

      .section-title {
        text-align: center;
        margin-bottom: 50px;
      }

      .section-title h1 {
        font-size: 48px;
        font-weight: 500;
        letter-spacing: 8px;
        margin-bottom: 15px;
      }

      .section-title p {
        font-size: 22px;
        color: #444;
      }

      /* PRODUCTS */
      .products {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 40px;
      }

      .product-card {
        text-align: center;
        position: relative;
        padding: 20px;
        transition: 0.4s;
      }

      .product-card:hover {
        transform: translateY(-10px);
      }

      .product-card img {
        width: 100%;
        max-width: 260px;
        height: 320px;
        object-fit: contain;
        margin: auto;
        display: block;
      }

      .badge {
        position: absolute;
        top: 20px;
        right: 25px;
        width: 85px;
        height: 85px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
        padding: 10px;
      }

      .orange {
        border: 2px solid orange;
        color: orange;
      }

      .green {
        border: 2px solid green;
        color: green;
      }

      .product-title {
        margin-top: 20px;
        font-size: 22px;
        line-height: 1.6;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .price {
        margin-top: 15px;
        font-size: 28px;
        color: #666;
      }

      /* FOOTER BAR */
      .bottom-bar {
        margin-top: 40px;
        border-top: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
      }

      .grid-icons {
        display: flex;
        gap: 20px;
        font-size: 28px;
        color: #777;
      }

      .sort {
        font-size: 24px;
        letter-spacing: 2px;
        cursor: pointer;
        color: #666;
      }

      /* RESPONSIVE */
      @media (max-width: 1200px) {
        .products {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 900px) {
        .container {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
        }

        nav {
          flex-wrap: wrap;
          gap: 20px;
        }
      }

      @media (max-width: 600px) {
        .products {
          grid-template-columns: 1fr;
        }

        .section-title h1 {
          font-size: 32px;
        }

        nav {
          font-size: 14px;
        }

        .icons {
          gap: 15px;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
