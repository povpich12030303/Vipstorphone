<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f5f5f5;
        padding: 30px;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        background: #fff;
        display: flex;
        gap: 30px;
        padding: 30px;
        border-radius: 10px;
      }

      .left {
        flex: 2;
      }

      .right {
        flex: 1;
        background: #fafafa;
        padding: 20px;
        border-radius: 10px;
      }

      h2 {
        margin-bottom: 15px;
      }

      input,
      select {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
      }

      .row {
        display: flex;
        gap: 15px;
      }

      .checkbox {
        margin-top: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .shipping {
        margin-top: 25px;
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
      }

      .payment-box {
        margin-top: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 15px;
      }

      .pay-btn {
        width: 100%;
        padding: 15px;
        background: black;
        color: white;
        border: none;
        border-radius: 8px;
        margin-top: 25px;
        font-size: 18px;
        cursor: pointer;
      }

      .product {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-bottom: 20px;
      }

      .product img {
        width: 80px;
        border-radius: 8px;
      }

      .summary {
        margin-top: 20px;
      }

      .summary p {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
      }

      .total {
        font-size: 22px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- LEFT -->
      <div class="left">
        <h2>Contact</h2>

        <input type="text" placeholder="Email or mobile phone number" />

        <div class="checkbox">
          <input type="checkbox" />
          <label>Email me with news and offers</label>
        </div>

        <h2 style="margin-top: 30px">Imformention</h2>

        <select>
          <option>Cambodia</option>
          <option>USA</option>
          <option>Vietnam</option>
        </select>

        <div class="row">
          <input type="text" placeholder="First name" />
          <input type="text" placeholder="Last name" />
        </div>

        <input type="text" placeholder="Company (optional)" />
        <input type="text" placeholder="Address" />
        <input type="text" placeholder="Apartment, suite, etc." />

        <div class="row">
          <input type="text" placeholder="City" />
          <input type="text" placeholder="Postal code" />
        </div>

        <input type="text" placeholder="Phone" />

        <div class="checkbox">
          <input type="checkbox" />
          <label>Save this information for next time</label>
        </div>

        <h2 style="margin-top: 30px">Shipping method</h2>

        <div class="shipping">
          <span>Free Shipping</span>
          <strong>FREE</strong>
        </div>

        <h2 style="margin-top: 30px">Payment</h2>

        <div class="payment-box">
          <p><strong>iPay88 Cambodia Online Payment</strong></p>
          <p style="margin-top: 10px">
            You'll be redirected to payment gateway after clicking Pay now.
          </p>
        </div>

        <button class="pay-btn">Pay Now</button>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="product">
          <img
            src="https://mac-center.com.pe/cdn/shop/files/IMG-18068283_m_jpeg_1_ce1a78fd-3192-49c3-9951-7a191fea9072.jpg?v=1757450089&width=823"
            alt=""
          />
          <div>
            <h3>IPHONE 17PROMAX</h3>
            <p>$1499</p>
          </div>
        </div>

        <input type="text" placeholder="Discount code" />

        <div class="summary">
          <p>
            <span>Subtotal</span>
            <span>$1499</span>
          </p>

          <p>
            <span>Shipping</span>
            <span>FREE</span>
          </p>

          <p class="total">
            <span>Total</span>
            <span>$1499</span>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="Hery.js"></script>
  </body>
</html>
